services:
  postgres:
    image: postgres:16-alpine
    container_name: split-bill-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: split_bill
      POSTGRES_USER: split_bill
      POSTGRES_PASSWORD: split_bill
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U split_bill -d split_bill"]
      interval: 10s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack:3
    container_name: split-bill-localstack
    restart: unless-stopped
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: us-east-1
      PERSISTENCE: 1
      DEBUG: 0
    ports:
      - "${LOCALSTACK_PORT:-4566}:4566"
    volumes:
      - localstack_data:/var/lib/localstack
      - ./infra/devops/localstack/init/10-create-bucket.sh:/etc/localstack/init/ready.d/10-create-bucket.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4566/_localstack/health | grep -q '\"s3\": \"running\"'"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
  localstack_data:
